<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Marina di Lava — Gestion Stock</title>
<link rel="stylesheet" href="/static/style.css"/>
</head>
<body>

<!-- Écran de connexion -->
<div id="login-screen">
  <div id="login-box">
    <div class="login-logo">🍹</div>
    <div class="login-brand">Marina di Lava</div>
    <div class="login-sub">Gestion de Stock</div>
    <div id="login-buttons">
      <button class="login-btn service-btn" onclick="loginService()">
        <span class="login-btn-icon">🍸</span>
        <span class="login-btn-label">Service</span>
        <span class="login-btn-desc">Enregistrer les sorties</span>
      </button>
      <button class="login-btn manager-btn" onclick="showPinInput()">
        <span class="login-btn-icon">⚙️</span>
        <span class="login-btn-label">Gérant</span>
        <span class="login-btn-desc">Accès complet</span>
      </button>
    </div>
    <div id="pin-area" class="hidden">
      <p class="pin-label">Code PIN</p>
      <input id="pin-input" type="password" inputmode="numeric" maxlength="8" placeholder="••••" autocomplete="off" onkeydown="if(event.key==='Enter') loginManager()"/>
      <button class="login-btn manager-btn" style="margin-top:12px" onclick="loginManager()">Valider</button>
      <p id="pin-error" class="pin-error hidden">Code incorrect</p>
      <button class="back-btn" onclick="hidePinInput()">← Retour</button>
    </div>
  </div>
</div>

<header>
  <div class="header-brand">
    <span class="logo">🍹</span>
    <div>
      <span class="brand-name">Marina di Lava</span>
      <span class="brand-sub">Gestion de Stock</span>
    </div>
  </div>
  <button id="hamburger" onclick="toggleNav()" aria-label="Menu">&#9776;</button>
  <nav id="main-nav">
    <button class="nav-btn active" data-view="stock">Stock &amp; Marges</button>
    <button class="nav-btn" data-view="cocktails">Cocktails &amp; Marges</button>
    <button class="nav-btn" data-view="alerts">Alertes <span id="alert-badge" class="badge hidden">0</span></button>
    <button class="nav-btn" data-view="cashpad">Import Cashpad</button>
    <button class="nav-btn" data-view="delivery">Bon de Livraison</button>
    <button class="nav-btn" data-view="inventory">Sortie Réserve</button>
    <button class="nav-btn" data-view="history">Historique</button>
    <button class="nav-btn" data-view="suppliers">Fournisseurs</button>
    <button class="nav-btn" data-view="mapping">Mapping Cashpad</button>
  </nav>
</header>

<main id="app"></main>

<!-- Modal -->
<div id="modal-overlay" class="hidden">
  <div id="modal-box">
    <button id="modal-close" onclick="closeModal()">✕</button>
    <div id="modal-content"></div>
  </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
