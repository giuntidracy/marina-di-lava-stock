<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Marina di Lava — Gestion Stock</title>
<link rel="stylesheet" href="/static/style.css"/>
</head>
<body>

<!-- Écran de connexion -->
<div id="login-screen">
  <div id="login-box">
    <img src="/static/logo.png" alt="Marina Di Lava" style="height:80px;object-fit:contain;margin-bottom:14px;filter:drop-shadow(0 4px 16px rgba(0,0,0,.4))"/>
    <div class="login-sub">Gestion de Stock</div>
    <div style="font-size:10px;color:rgba(201,168,76,.6);margin-bottom:28px;letter-spacing:1.5px;text-transform:uppercase;font-weight:500">By Giunti J-Marc</div>
    <div id="login-buttons">
      <button class="login-btn service-btn" onclick="loginService()">
        <span class="login-btn-icon">🍸</span>
        <div>
          <span class="login-btn-label">Service</span>
          <span class="login-btn-desc">Enregistrer les sorties</span>
        </div>
      </button>
      <button class="login-btn manager-btn" onclick="showPinInput()">
        <span class="login-btn-icon" style="color:var(--primary);display:flex;align-items:center">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M12 15.5A3.5 3.5 0 018.5 12 3.5 3.5 0 0112 8.5a3.5 3.5 0 013.5 3.5 3.5 3.5 0 01-3.5 3.5m7.43-2.92c.04-.34.07-.67.07-1.08s-.03-.75-.07-1.08l2.33-1.82c.21-.16.27-.45.13-.69l-2.2-3.82c-.14-.24-.43-.32-.67-.24l-2.75 1.1c-.57-.44-1.18-.8-1.85-1.08L14 2.42c-.04-.26-.27-.42-.5-.42h-4.4c-.23 0-.46.16-.5.42l-.42 2.95c-.67.28-1.28.64-1.85 1.08l-2.75-1.1c-.24-.08-.53 0-.67.24L.71 9.51c-.14.24-.08.53.13.69l2.33 1.82c-.04.33-.07.67-.07 1.08s.03.75.07 1.08L.84 16c-.21.16-.27.45-.13.69l2.2 3.82c.14.24.43.32.67.24l2.75-1.1c.57.44 1.18.8 1.85 1.08l.42 2.95c.04.26.27.42.5.42h4.4c.23 0 .46-.16.5-.42l.42-2.95c.67-.28 1.28-.64 1.85-1.08l2.75 1.1c.24.08.53 0 .67-.24l2.2-3.82c.14-.24.08-.53-.13-.69l-2.33-1.82z"/></svg>
        </span>
        <div>
          <span class="login-btn-label">Gérant</span>
          <span class="login-btn-desc">Accès complet</span>
        </div>
      </button>
    </div>
    <div id="pin-area" class="hidden">
      <p class="pin-label">Code PIN</p>
      <input id="pin-input" type="password" inputmode="numeric" maxlength="8" placeholder="••••" autocomplete="off" onkeydown="if(event.key==='Enter') loginManager()"/>
      <button class="login-btn manager-btn" style="margin-top:14px;justify-content:center;font-size:15px;font-weight:700" onclick="loginManager()">Valider</button>
      <p id="pin-error" class="pin-error hidden">Code incorrect</p>
      <button class="back-btn" onclick="hidePinInput()">← Retour</button>
    </div>
  </div>
</div>

<!-- App Shell -->
<div id="app-shell" class="app-shell hidden">

  <aside id="sidebar" class="sidebar">
    <div class="sidebar-top">
      <div class="sidebar-brand">
        <img src="/static/logo.png" alt="Marina Di Lava" class="sidebar-logo"/>
        <div class="sidebar-brand-text">
          <div class="sidebar-brand-name">Marina di Lava</div>
          <div class="sidebar-brand-sub">Corsica Hotel</div>
        </div>
      </div>
      <button class="sidebar-collapse-btn" id="sidebar-toggle" onclick="toggleSidebar()" title="Réduire">◀</button>
    </div>

    <nav class="sidebar-nav" id="main-nav">
      <div class="nav-group" id="navg-stock">
        <span class="nav-group-label">Stock</span>
        <button class="nav-item" data-view="dashboard"><span class="nav-icon">🏠</span><span class="nav-label">Tableau de bord</span></button>
        <button class="nav-item" data-view="stock"><span class="nav-icon">📦</span><span class="nav-label">Stock &amp; Marges</span></button>
        <button class="nav-item" data-view="cocktails"><span class="nav-icon">🍹</span><span class="nav-label">Cocktails &amp; Marges</span></button>
        <button class="nav-item" data-view="alerts"><span class="nav-icon">🔔</span><span class="nav-label">Alertes</span><span id="alert-badge" class="nav-badge hidden">0</span></button>
        <button class="nav-item" data-view="shrinkage"><span class="nav-icon">📉</span><span class="nav-label">Démarque</span></button>
      </div>

      <div class="nav-group" id="navg-ops">
        <span class="nav-group-label">Opérations</span>
        <button class="nav-item" data-view="cashpad"><span class="nav-icon">💳</span><span class="nav-label">Import Cashpad</span></button>
        <button class="nav-item" data-view="delivery"><span class="nav-icon">🚚</span><span class="nav-label">Bon de Livraison</span></button>
        <button class="nav-item" data-view="inventory"><span class="nav-icon">🍸</span><span class="nav-label">Sortie Réserve</span></button>
      </div>

      <div class="nav-group" id="navg-analyse">
        <span class="nav-group-label">Analyses</span>
        <button class="nav-item" data-view="stats"><span class="nav-icon">📊</span><span class="nav-label">Statistiques</span></button>
        <button class="nav-item" data-view="history"><span class="nav-icon">📅</span><span class="nav-label">Historique</span></button>
        <button class="nav-item" data-view="events"><span class="nav-icon">🎉</span><span class="nav-label">Événements</span></button>
      </div>

      <div class="nav-group" id="navg-gestion">
        <span class="nav-group-label">Gestion</span>
        <button class="nav-item" data-view="suppliers"><span class="nav-icon">🏪</span><span class="nav-label">Fournisseurs</span></button>
        <button class="nav-item" data-view="orders"><span class="nav-icon">🛒</span><span class="nav-label">Commandes</span></button>
        <button class="nav-item" data-view="mapping"><span class="nav-icon">🗺️</span><span class="nav-label">Mapping Cashpad</span></button>
      </div>
    </nav>

    <div class="sidebar-footer">
      <div id="sidebar-role" class="sidebar-role-badge"></div>
      <button class="sidebar-logout" onclick="logout()">
        <span class="nav-icon">⏻</span><span class="nav-label">Déconnexion</span>
      </button>
    </div>
  </aside>

  <div id="sidebar-overlay" class="sidebar-overlay" onclick="closeSidebar()"></div>

  <div class="main-wrapper">
    <header class="top-bar">
      <button class="hamburger-btn" onclick="toggleSidebar()" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
      <div class="top-bar-title" id="top-bar-title">Stock &amp; Marges</div>
      <div class="top-bar-actions">
        <button id="scan-fab" class="scan-fab-topbar hidden" onclick="openGlobalScanner()" title="Scanner un code-barres">📷</button>
      </div>
    </header>
    <main id="app"></main>
  </div>
</div>

<!-- Modal -->
<div id="modal-overlay" class="hidden">
  <div id="modal-box">
    <button id="modal-close" onclick="closeModal()">✕</button>
    <div id="modal-content"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="/static/app.js?v=20260416j"></script>
</body>
</html>
